name: Generate Release Notes

on:
  push:
    branches: ['**']

jobs:
  generate:
    name: Generate and publish release notes
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run release notes generator
        run: |
          node scripts/generate-release-notes.mjs "${{ github.event.before }}" "${{ github.event.after || github.sha }}" || true
        continue-on-error: true

      - name: Verify release notes files exist
        run: |
          if [ ! -f release-summary-human.md ]; then echo "# Release Summary" > release-summary-human.md; fi
          if [ ! -f release-notes-technical.md ]; then echo "# Technical Release Notes" > release-notes-technical.md; fi
          ls -la release-*.md

      - name: Upload release note artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: |
            release-summary-human.md
            release-notes-technical.md

      - name: Add to Actions run summary (human)
        if: always()
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          cat release-summary-human.md >> $GITHUB_STEP_SUMMARY

      - name: Add to Actions run summary (technical)
        if: always()
        run: |
          echo "\n## Technical Release Notes" >> $GITHUB_STEP_SUMMARY
          cat release-notes-technical.md >> $GITHUB_STEP_SUMMARY

      - name: Create draft release for this commit
        uses: softprops/action-gh-release@v1
        with:
          draft: true
          body_path: release-summary-human.md
          name: "Release ${{ github.sha }}"
          tag_name: release-${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
